# ===============================
# Server Config (VERY IMPORTANT)
# ===============================
server.port=${PORT}
server.address=0.0.0.0

# ===============================
# MySql Database (PROD)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ===============================
# JPA
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=false

# ===============================
# Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ===============================
# Logging (PROD)
# ===============================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,metrics

# ===============================
# Security (PROD)
# ===============================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS}
app.oauth2.authorized-redirect-uri=http://localhost:4200/oauth2/callback
app.auth.name=${APP_AUTH_NAME}
app.auth.email=${APP_AUTH_EMAIL}
app.auth.password=${APP_AUTH_PASSWORD}
app.auth.mobile-number=${APP_AUTH_MOBILE_NUMBER}
app.auth.roles=${APP_AUTH_ROLES}

# Enable when Google OAuth2 credentials are available in environment:
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
