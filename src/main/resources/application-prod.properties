# ===============================
# MySQL Database (PROD)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password

# ===============================
# JPA (MySQL)
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ===============================
# Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ===============================
# Logging (PROD)
# ===============================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,metrics

# ===============================
# Security (PROD)
# ===============================
app.jwt.secret=${APP_JWT_SECRET:QXBwU2VjdXJlSnd0U2VjcmV0S2V5Rm9yUXVhbnRpdHlNZWFzdXJlbWVudEFwcDIwMjY=}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.oauth2.authorized-redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/oauth2/callback}
app.auth.name=${APP_AUTH_NAME:App User}
app.auth.email=${APP_AUTH_EMAIL:appuser@example.com}
app.auth.password=${APP_AUTH_PASSWORD:password123}
app.auth.mobile-number=${APP_AUTH_MOBILE_NUMBER:+15555550123}
app.auth.roles=${APP_AUTH_ROLES:ROLE_USER}

# Enable when Google OAuth2 credentials are available in environment:
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
