# ===============================
# Application Configuration
# ===============================
spring.application.name=Quantity Measurement App
server.port=${APP_PORT:8081}
server.address=0.0.0.0

# ===============================
# Repository Type
# ===============================
repository.type=database

# ===============================
# JPA (MySQL)
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# ===============================
# Database
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quantitymeasurementapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Anvesh2005}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ===============================
# HikariCP (Connection Pool)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===============================
# Logging (DEV)
# ===============================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.app.quantitymeasurement=${LOGGING_LEVEL_COM_APP_QUANTITYMEASUREMENT:DEBUG}
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{5}:%line - %msg%n

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# ===============================
# Security - JWT
# ===============================
app.jwt.secret=${APP_JWT_SECRET:13c41d0403bc2dfe9b7bb90fdaaf693a641bd9ebda82728369c4cbcded9605223b8a155529872a452562b084e66e3acfc9d135ab16f63923fba8f34509a0879b}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# ===============================
# Application Authentication
# ===============================
app.auth.name=${APP_AUTH_NAME:App User}
app.auth.email=${APP_AUTH_EMAIL:appuser@example.com}
app.auth.password=${APP_AUTH_PASSWORD:app_password_123}
app.auth.mobile-number=${APP_AUTH_MOBILE_NUMBER:+15555550123}
app.auth.roles=${APP_AUTH_ROLES:ROLE_USER}

# ===============================
# Security - OAuth2 Redirect
# ===============================
app.oauth2.authorized-redirect-uri=${APP_OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:4200/oauth2/callback}

# ===============================
# Security - Google OAuth2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email