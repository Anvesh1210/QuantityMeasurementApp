# ===============================
# Application Configuration
# ===============================
spring.application.name=Quantity Measurement App
server.port=${PORT:8080}
server.address=0.0.0.0

# ===============================
# Repository Type
# ===============================
repository.type=database

# ===============================
# JPA (H2 - DEV)
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Database
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=

# ===============================
# HikariCP (Connection Pool)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===============================
# Logging (DEV)
# ===============================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{5}:%line - %msg%n

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# ===============================
# Security - JWT
# ===============================
app.oauth2.authorized-redirect-uri=http://localhost:4200/oauth2/callback

# Local credential used by /api/v1/auth/login
app.auth.name=App User
app.auth.email=appuser@example.com
app.auth.password=${APP_AUTH_PASSWORD}
app.auth.mobile-number=+15555550123
app.auth.roles=ROLE_USER

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# ===============================
# Security - Google OAuth2
# ===============================
# Configure these in your environment or profile to enable Google login.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
